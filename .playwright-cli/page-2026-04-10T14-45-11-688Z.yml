    - generic [ref=e80]:
      - heading "About Confitura" [level=2] [ref=e81]
      - generic [ref=e82]:
        - paragraph [ref=e83]: Confitura is one of Poland’s premier and longest-running software conferences. Organized by a dedicated team of Java developers, architects, and industry professionals, the conference features a comprehensive program of sessions and workshops led by both Polish and international experts. Covering a broad spectrum of topics, Confitura addresses everything from advanced coding practices to the latest trends in software development.
        - paragraph [ref=e84]: The conference is renowned for its inclusive and welcoming atmosphere, ensuring accessibility for professionals at every stage of their career. With multiple tracks available, attendees can customize their experience based on their areas of interest and expertise. Additionally, Confitura remains committed to keeping its attendance fees affordable, fostering wider participation.
        - paragraph [ref=e85]: Beyond the technical sessions, Confitura offers extensive networking opportunities during breaks and social events, promoting meaningful connections between attendees, speakers, and industry leaders. The conference’s unwavering focus on quality content and community engagement has established it as a cornerstone event in Poland’s IT sector.
      - generic [ref=e86]: Our main goal is to promote JVM technologies and have fun doing so.
    - generic [ref=e88]:
      - link "Al & NLP Day 2025":
        - /url: https://nlpday.pl/
        - img "Al & NLP Day 2025"
      - paragraph [ref=e89]: This year's edition of Confitura will be held in conjunction with Al & NLP Day 2025 - a two-day conference featuring inspiring sessions and hands-on workshops dedicated to the most important advances and applications in artificial intelligence, machine learning, and natural language processing.
      - paragraph [ref=e90]: "EXPANDED PROGRAM: Parallel to Confitura's main tracks, participants can attend specialized sessions practical workshops dedicated to the forefront of generativev artificial intelligence. The program features in-depth explorations of Polish large language models, emerging trends in GenAl, real-world applications of LLMs, and practical guidance on implementing generative Al solutions across diverse environments."
      - paragraph [ref=e91]: "CROSS-DISCIPLINARY NETWORKING: Meet and engage with both the thriving communityof Confitu ra and leading Al experts, academic researchers, and PolEval competition winners gathered for Al & NLP Day. This unique format offers even greater scope for knowledge sharing, recruitment, and brand visibility across intersecting sectors of IT, Al, and data science."
      - paragraph [ref=e92]:
        - link "check them out" [ref=e94] [cursor=pointer]:
          - /url: https://nlpday.pl/
