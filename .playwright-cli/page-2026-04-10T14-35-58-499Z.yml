        - heading "about us" [level=2] [ref=e204]
        - generic [ref=e205]: Organized by a group of highly-skilled, passionate Java developers, architects, and affiliates gathers Polish and International leaders of the community to share their knowledge and experience both, during sessions and breaks. Low attending fee makes Confitura accessible for everyone, what's more money from sales goes straight to charity organizations.
        - generic [ref=e206]: Our main goal is to promote JVM technologies and have fun doing so.
