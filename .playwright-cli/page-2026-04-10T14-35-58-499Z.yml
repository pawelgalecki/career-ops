          - generic [ref=e212]: Everything has started in 2007, when the group of passionate Java developers decided to create a programming event for the community. Today we're running the conference for more than 2000 attendees. 35 talks in 5 parallel sessions give an opportunity to learn new things to everyone! Our live streams and recordings of talks gain enormous popularity on the web. That's why organizing this event gives satisfaction to more than 30 people from Confitura's team. That eagers us to organize another Confitura, this year it will be the 15th.
