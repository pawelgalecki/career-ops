              - paragraph [ref=e237]: "* varies by country"
              - paragraph [ref=e238]
              - paragraph [ref=e239]:
                - strong [ref=e240]: Seeing Beyond the Job Ad
              - paragraph [ref=e241]: At Turnitin, we recognize it’s unrealistic for candidates to fulfill 100% of the criteria in a job ad. We encourage you to apply if you meet the majority of the requirements because we know that skills evolve over time. If you’re willing to learn and evolve alongside us, join our team!
              - paragraph [ref=e242]
              - paragraph [ref=e243]: Turnitin, LLC is committed to the policy that all persons have equal access to its programs, facilities and employment. All qualified applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, disability, or status as a protected veteran.
