                - strong [ref=e131]: Company Description
              - paragraph [ref=e132]: "When you join Turnitin, you'll be welcomed into a company that is a recognized innovator in the global education space. For over 25 years, Turnitin has partnered with educational institutions to promote honesty, consistency, and fairness across all subject areas and assessment types. Over 21,000 academic institutions, publishers, and corporations use our services: Feedback Studio, Originality, Gradescope, ExamSoft, Similarity, and iThenticate."
              - paragraph [ref=e133]
              - paragraph [ref=e134]: Experience a remote-centric culture that empowers you to work with purpose and accountability in a way that best suits you, supported by a comprehensive package that prioritizes your overall well-being. Our diverse community of colleagues are all unified by a shared desire to make a difference in education.
              - paragraph [ref=e135]
              - paragraph [ref=e136]: Turnitin is a global organization with team members in over 35 countries including the United States, Mexico, United Kingdom, Australia, Japan, India, and the Philippines.
              - paragraph [ref=e137]
              - paragraph [ref=e138]:
                - strong [ref=e139]: Job Description
              - paragraph [ref=e140]:
                - text: Turnitin is seeking a
                - strong [ref=e141]: Principal Fullstack/Backend Engineer
                - text: with a strong focus on backend development, particularly in Java and serverless architectures, combined with solid frontend experience. This role is ideal for engineers passionate about building scalable distributed systems, data modeling, and delivering high-performing, reliable software solutions for our award-winning educational platform.
              - paragraph [ref=e142]
              - paragraph [ref=e143]: As a core contributor to our shared services team, you will play a key role in developing and enhancing the foundational systems that power both existing and new applications. This role is fully hands-on, requiring active involvement in coding, development, and implementation of technical solutions.
              - paragraph [ref=e144]: Turnitin is seeking a Principal Fullstack/Backend Engineer with a strong focus on backend development, particularly in Java and serverless architectures, combined with solid frontend experience. This role is ideal for engineers passionate about building scalable distributed systems, data modeling, and delivering high-performing, reliable software solutions for our award-winning educational platform.
              - paragraph [ref=e145]
              - paragraph [ref=e146]: As a core contributor to our shared services team, you will play a key role in developing and enhancing the foundational systems that power both existing and new applications. This role is fully hands-on, requiring active involvement in coding, development, and implementation of technical solutions.
              - paragraph [ref=e147]
              - paragraph [ref=e148]:
                - strong [ref=e149]: "Responsibilities:"
              - list [ref=e150]:
                - listitem [ref=e151]: Lead and design, development, and optimization of scalable backend services using Java and serverless technologies (e.g., AWS Lambda).
                - listitem [ref=e152]: Architect and implement RESTful APIs and event-driven systems to support high-performance, distributed applications.
                - listitem [ref=e153]: Provide technical leadership to the team, ensuring alignment with architectural standards and best practices.
                - listitem [ref=e154]: Contribute to the development and integration of user-facing frontend components when needed.
                - listitem [ref=e155]: Analyze and optimize existing services to enhance performance, scalability, and cost-efficiency.
                - listitem [ref=e156]: Collaborate with cross-functional teams, including Architects, Product Managers, and engineering leads, to deliver innovative and impactful solutions.
                - listitem [ref=e157]: Mentor and guide junior developers, fostering a culture of continuous learning and knowledge sharing.
                - listitem [ref=e158]: Oversee the implementation and maintenance of CI/CD pipelines to ensure efficient and reliable software delivery.
                - listitem [ref=e159]: Maintain high standards of code quality through rigorous peer reviews, comprehensive testing, and adherence to industry best practices.
                - listitem [ref=e160]: Create comprehensive documentation for the developed shared components, including usage guidelines and examples.
              - paragraph [ref=e161]
              - paragraph [ref=e162]:
                - strong [ref=e163]: Qualifications
              - paragraph [ref=e164]:
                - strong [ref=e165]: "Essential Qualifications, Skills, and Knowledge/Experience:"
              - list [ref=e166]:
                - listitem [ref=e167]: Over 10 years of experience in backend development with deep proficiency in Java and extensive hands-on experience with serverless frameworks (e.g., AWS Lambda, Google Cloud Functions).
                - listitem [ref=e168]: Solid understanding of frontend technologies, including React and Web Components, with the ability to contribute when needed.
                - listitem [ref=e169]: Expertise in designing and managing distributed systems, ensuring scalability, and advanced data modeling techniques.
                - listitem [ref=e170]: Demonstrated ability to lead and collaborate effectively with cross-functional teams and stakeholders across multiple locations, including distributed teams in Europe and the USA, to deliver impactful, high-quality solutions.
                - listitem [ref=e171]: Practical expertise in cloud technologies, specifically developing serverless applications on AWS using services such as Lambda, DynamoDB, API Gateway, SNS/SQS, and EventBridge.
                - listitem [ref=e172]:
                  - text: Deep understanding of
                  - strong [ref=e173]: software development best practices
                  - text: ", including design patterns, test-driven development (TDD), and clean code principles."
                - listitem [ref=e174]: Experience implementing and managing CI/CD pipelines for automated build, deployment, and testing.
                - listitem [ref=e175]:
                  - text: Familiarity with modern
                  - strong [ref=e176]: DevOps practices
                  - text: and infrastructure-as-code (IaC).
                - listitem [ref=e177]: Proven ability to conduct comprehensive system design reviews, ensuring architectural alignment, scalability, performance, and adherence to best practices.
                - listitem [ref=e178]: Proven experience as a Tech Lead, with a strong track record of mentoring and coaching junior engineers, promoting skill development, and driving adherence to best practices to ensure team growth and technical excellence.
                - listitem [ref=e179]: Exceptional collaboration skills, working effectively across cross-functional teams, including Product Managers, Architects, and other engineering leads.
                - listitem [ref=e180]: Ability to communicate complex technical concepts clearly to both technical and non-technical stakeholders.
                - listitem [ref=e181]: Strong problem-solving skills, with a track record of troubleshooting and optimizing existing systems for performance, scalability, and cost efficiency.
                - listitem [ref=e182]: Ability to make strategic technical decisions while balancing project deadlines and business goals.
              - paragraph [ref=e183]
              - paragraph [ref=e184]:
                - strong [ref=e185]: "Preferred Skills:"
              - list [ref=e186]:
                - listitem [ref=e187]:
                  - text: Experience with
                  - strong [ref=e188]: frontend technologies
                  - text: such as React, Angular, or Web Components is a plus.
                - listitem [ref=e189]:
                  - text: Familiarity with
                  - strong [ref=e190]: monitoring and observability tools
                  - text: (e.g., CloudWatch, New Relic, Datadog).
                - listitem [ref=e191]:
                  - text: Knowledge of
                  - strong [ref=e192]: data modeling
                  - text: and working with both NoSQL databases.
                - listitem [ref=e193]: Understanding of agile methodologies, including Scrum and Kanban.
                - listitem [ref=e194]: Understanding or experience with AI/ML.
              - paragraph [ref=e195]
              - paragraph [ref=e196]:
                - strong [ref=e197]: Additional Information
              - paragraph [ref=e198]:
                - strong [ref=e199]: Total Rewards @ Turnitin
              - paragraph [ref=e200]: Turnitin maintains a Total Rewards package that is competitive within the local job market. People tend to think about their Total Rewards monetarily — solely as regular pay plus bonus or commission. This is what they earn in exchange for what they do. However, Turnitin delivers more than just these components. Beyond the intrinsic rewards of unleashing your potential to positively impact global education, and thriving in an organization that is free of politics and full of humble, inclusive and collaborative teammates, the extrinsic rewards at Turnitin include generous time off and health and wellness programs that offer choice and flexibility and provide a safety net for the challenges that life presents from time to time. Experience a remote-centric culture that empowers you to work with purpose and accountability in a way that best suits you, supported by a comprehensive package that prioritizes your overall well-being.
              - paragraph [ref=e201]
              - paragraph [ref=e202]:
                - strong [ref=e203]: Our Mission
                - text: is to ensure the integrity of global education and meaningfully improve learning outcomes.
              - paragraph [ref=e204]
              - paragraph [ref=e205]:
                - strong [ref=e206]: Our Values
                - text: underpin everything we do.
              - list [ref=e207]:
                - listitem [ref=e208]:
                  - strong [ref=e209]: Customer Centric
                  - text: "- We realize our mission to ensure integrity and improve learning outcomes by putting educators and learners at the center of everything we do."
                - listitem [ref=e210]:
                  - strong [ref=e211]: Passion for Learning
                  - text: "- We seek out teammates that are constantly learning and growing and build a workplace which enables them to do so."
                - listitem [ref=e212]:
                  - strong [ref=e213]: Integrity
                  - text: "- We believe integrity is the heartbeat of Turnitin. It shapes our products, the way we treat each other, and how we work with our customers and vendors."
                - listitem [ref=e214]:
                  - strong [ref=e215]: Action & Ownership
                  - text: "- We have a bias toward action and empower teammates to make decisions."
                - listitem [ref=e216]:
                  - strong [ref=e217]: One Team
                  - text: "- We strive to break down silos, collaborate effectively, and celebrate each other’s successes."
                - listitem [ref=e218]:
                  - strong [ref=e219]: Global Mindset
                  - text: "- We respect local cultures and embrace diversity. We think globally and act locally to maximize our impact on education."
              - paragraph [ref=e220]
              - paragraph [ref=e221]:
