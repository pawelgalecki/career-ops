        - generic [ref=e131]:
          - generic [ref=e133]:
            - generic [ref=e134]:
              - paragraph [ref=e135]: We are the company behind CKEditor – an open-source rich text editor used by millions of people around the world. We are part of Tiugo Technologies, a family of API-first developer platforms (CKEditor, TinyMCE, ButterCMS, Uploadcare) focused on content creation and digital collaboration.
              - paragraph [ref=e136]
              - paragraph [ref=e137]:
                - strong [ref=e138]: "Your role:"
              - paragraph [ref=e139]: As a Principal Product Engineer, you will work at the intersection of engineering, product discovery, and product delivery. Your main focus will be on CKEditor, starting with the editor and frontend experience, and extending to supporting backend services and AI where relevant. You will also contribute to other CKSource products, with a stronger emphasis on frontend components and shared building blocks.
              - paragraph [ref=e140]: Your primary mission is to identify high-leverage opportunities, rapidly prototype solutions, and evolve the best experiments into production-ready capabilities.
              - paragraph [ref=e141]: You will collaborate closely with engineering leaders, product managers, and domain experts to shape product direction. You will also work with teams across the editor/frontend, cloud services, and integrations to ship end-to-end features.
              - paragraph [ref=e142]: This role requires a builder mindset and comfort operating in ambiguity. It is a high-autonomy individual contributor position where you influence product direction across CKEditor and CKSource. You will also help teams adopt AI-assisted development in their daily workflows.
              - paragraph [ref=e143]
              - paragraph [ref=e144]:
                - strong [ref=e145]: "Key responsibilities:"
              - list [ref=e146]:
                - listitem [ref=e147]: Solve high-impact problems across CKEditor and CKSource products, spotting where AI or automation can add value.
                - listitem [ref=e148]: Work with product and engineering stakeholders to clarify goals, scope, and success metrics.
                - listitem [ref=e149]: Design pragmatic end-to-end solutions across the editor, backend services, and other portfolio products.
                - listitem [ref=e150]: Prototype quickly, iterate with feedback, and evolve the best ideas into production features.
                - listitem [ref=e151]: Build integrations and platform patterns (APIs, workflows, ecosystems) that extend product capabilities.
                - listitem [ref=e152]: Influence technical direction and best practices across teams, helping others adopt new tools effectively.
                - listitem [ref=e153]: Drive adoption of AI-assisted development (agents, reviews, testing, ops) to improve how we build and ship software.
              - paragraph [ref=e154]
              - paragraph [ref=e155]:
                - strong [ref=e156]: "To be successful in this role you need the following:"
              - list [ref=e157]:
                - listitem [ref=e158]: 8+ years of experience in software engineering.
                - listitem [ref=e159]: Strong system design and frontend engineering skills, with hands-on experience in modern frontend technologies (JavaScript / TypeScript).
                - listitem [ref=e160]: Ability to move from problem definition → architecture → implementation.
                - listitem [ref=e161]: Experience with automation, workflows, or agent-like systems.
                - listitem [ref=e162]: Hands-on approach and willingness to write production code.
                - listitem [ref=e163]: Fluency in Polish and English (minimum C1 level).
                - listitem [ref=e164]: Strong engineering judgment (including knowing when not to use AI).
                - listitem [ref=e165]: Experience working across teams and influencing technical decisions. Ability to collaborate effectively with different groups.
                - listitem [ref=e166]: Curiosity, ownership, and a strong interest in applying AI in practice.
                - listitem [ref=e167]: Experience with AI in developer tooling or internal systems.
              - paragraph [ref=e168]
              - paragraph [ref=e169]:
                - strong [ref=e170]: "Nice to have:"
              - list [ref=e171]:
                - listitem [ref=e172]: Experience working on complex frontend applications or with developer tools.
                - listitem [ref=e173]: Experience with rich text editors, document systems, or collaborative editing tools.
                - listitem [ref=e174]: Background in content platforms, developer tools, or productivity software.
              - paragraph [ref=e175]
              - paragraph [ref=e176]:
                - strong [ref=e177]: "Why join CKSource:"
              - paragraph [ref=e178]: "Our people are a huge part of what makes CKSource a great place to work! Aside from a great team, some of our benefits include:"
              - list [ref=e179]:
                - listitem [ref=e180]: B2B contract-based monthly remuneration is 38.000 - 45.000 PLN + VAT or its equivalent on the employment contract.
                - listitem [ref=e181]: Flexible schedule and the possibility to work fully remotely.
                - listitem [ref=e182]: Professional development resources (up to 5 days of additional leave and 6 000 PLN yearly).
                - listitem [ref=e183]: LinkedIn Learning access.
                - listitem [ref=e184]: Extra leave for Tiugo Day – our company’s foundation day and your birthday.
                - listitem [ref=e185]: English lessons with a native speaker and an online language platform where you can learn English, Spanish, and German.
                - listitem [ref=e186]: Access to a mental health and well-being platform with 24/7 dedicated psychological support.
                - listitem [ref=e187]: Private medical care (Enel Med or Medicover) and Multisport card.
                - listitem [ref=e188]: 2 weeks of paid parental leave for our contractors.
              - paragraph [ref=e189]
              - paragraph [ref=e190]:
                - strong [ref=e191]: "Recruitment process:"
              - list [ref=e192]:
                - listitem [ref=e193]: HR interview.
                - listitem [ref=e194]: Technical interview with the Director of Engineering.
                - listitem [ref=e195]: Paid task – a practical assignment reflecting real challenges you may encounter in this role.
                - listitem [ref=e196]: Solution review discussion – a conversation about your approach, decisions, and trade-offs in the task.
