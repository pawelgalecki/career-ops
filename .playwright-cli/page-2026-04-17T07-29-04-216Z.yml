          - generic [ref=e133]:
            - generic [ref=e134]:
              - text: "Salmon is a next-generation fintech company with a clear mission: to reshape the banking landscape in the Philippines and demonstrate that people deserve better financial services. Founded by visionary leaders Pavel Fedorov, George Chesakov, and Raffy Montemayor, Salmon is more than just a fast-growing technology company – we’re a bank with over 60 years of heritage. In 2024, we proudly transformed the Rural Bank of Sta. Rosa (Laguna), Inc. into"
              - strong [ref=e135]: Salmon Bank (Rural Bank) Inc.
              - text: With over 1 million Filipinos already trusting Salmon, we are continuously expanding our offerings and aiming to become a true
              - strong [ref=e136]: financial super app
              - text: for millions more.
              - strong [ref=e137]: Why Salmon?
              - list [ref=e138]:
                - listitem [ref=e139]: "Exponential Growth: In 2025, we more than doubled our deposits, loans, and net income."
                - listitem [ref=e140]: "Loved by Users: Our app is rated 4.8★, with 92% of users recommending us to friends and family."
                - listitem [ref=e141]: "Top-Tier Team: Work alongside experts from fintech, banking, startups, and global companies."
                - listitem [ref=e142]: "Innovation: We are at the intersection of finance and technology, shaping the future with bold ideas every day."
              - text: We are looking for an experienced
              - strong [ref=e143]: Java Engineer (readiness to switch to Kotlin)
              - text: to help us design, build, and scale the core banking and partner platforms that power Salmon’s products. In this role, you will work on high-load, mission-critical systems, design robust APIs, and contribute to shared platform components used across the company. You will have a high level of ownership and influence over architectural decisions.
              - strong [ref=e144]: Your Future Tasks
              - list [ref=e145]:
                - listitem [ref=e146]: Design and evolve banking APIs for mobile applications and internal/external services.
                - listitem [ref=e147]: Build scalable backend solutions using Kotlin (readiness to switch to Kotlin) and modern JVM technologies (Ktor, jOOQ, coroutines, Arrow).
                - listitem [ref=e148]: Develop and improve public APIs, internal SDKs, and shared platform components.
                - listitem [ref=e149]: Implement high-performance integrations with partners and third-party systems.
                - listitem [ref=e150]: Contribute to the architecture, scalability, and reliability of core banking and partner platforms.
              - strong [ref=e151]: What We Expect
              - list [ref=e152]:
                - listitem [ref=e153]: 5+ years of experience in the JVM ecosystem, with strong expertise in Kotlin or Java.
                - listitem [ref=e154]: Deep understanding of concurrency and asynchronous programming.
                - listitem [ref=e155]: Experience designing systems using clean architectures (DDD, event-driven approaches).
                - listitem [ref=e156]: Solid knowledge of distributed systems and their trade-offs.
                - listitem [ref=e157]: Hands-on experience with Docker and Kubernetes, preferably in an AWS environment.
                - listitem [ref=e158]: Strong sense of ownership, continuous learning, and a willingness to share knowledge within the team.
              - strong [ref=e159]: Nice To Have / Bonus
              - list [ref=e160]:
                - listitem [ref=e161]: Interest or experience in platform engineering.
                - listitem [ref=e162]: Close collaboration with business and product requirements.
                - listitem [ref=e163]: Experience with database performance optimization.
                - listitem [ref=e164]: Background in functional programming.
                - listitem [ref=e165]: Experience building internal libraries, SDKs, or developer tools.
              - strong [ref=e166]: Why It’s Great To Work With Us
              - list [ref=e167]:
                - listitem [ref=e168]: We build modern banking services used by millions of Filipinos.
                - listitem [ref=e169]: We develop cutting-edge solutions based on global best practices and AI technologies.
                - listitem [ref=e170]: We are a licensed neobank aiming to become a unicorn and a leading fintech player in Southeast Asia.
                - listitem [ref=e171]: Backed by over $60MM from ADQ (Abu Dhabi sovereign wealth fund), the World Bank Group, and other investors, even in challenging market conditions.
                - listitem [ref=e172]: We operate in an environment where new products are launched in 3–4 months.
                - listitem [ref=e173]: We have a strong foundation for international expansion.
              - strong [ref=e174]: What We Offer
              - list [ref=e175]:
                - listitem [ref=e176]: A passionate international team working across multiple regions.
                - listitem [ref=e177]: Rapid professional growth in a true merit-based environment.
                - listitem [ref=e178]: Performance-based rewards and long-term participation in Salmon’s success.
                - listitem [ref=e179]: A fast track for international growth.
                - listitem [ref=e180]: New office in Manila, Philippines.
                - listitem [ref=e181]: Relocation support for eligible candidates.
                - listitem [ref=e182]: Remote and hybrid work options.
                - listitem [ref=e183]: Medical insurance and health & wellness benefits.
                - listitem [ref=e184]: A rich program of events and activities, both online and in person.
              - text: If you want to work on large-scale banking platforms, influence architecture, and build systems used by millions — we would be happy to hear from you.
