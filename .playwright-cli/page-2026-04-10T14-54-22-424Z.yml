            - paragraph [ref=e419]: See what leading insurers say about working with Decerto.
          - generic [ref=e420]:
            - list [ref=e424]:
              - group "1 / 7" [ref=e425]:
                - generic [ref=e427]:
                  - img "InterRisk TU SA Vienna Insurance Group" [ref=e429]
                  - generic [ref=e431]: Decerto designed and delivered a modern, secure, and intuitive sales platform that significantly improved our efficiency and gave business teams greater independence in product management. Their unique combination of deep insurance expertise and strong technological know-how, combined with agile delivery, ensured the project was completed on time and to the highest standards.
                  - generic [ref=e434]:
                    - generic [ref=e435]: Rafał Zieliński
                    - generic [ref=e436]: Product Owner at InterRisk TU S.A. Vienna Insurance Group
              - group "2 / 7" [ref=e437]:
                - generic [ref=e439]:
                  - img "Warta" [ref=e441]
                  - generic [ref=e443]: Our goal was to create a product that addresses the real needs of entrepreneurs, without burdening them with unnecessary formalities. Previously, declaring PKD codes was time-consuming and prone to error. With this new solution, we’ve eliminated that requirement, offering our clients comprehensive and effective coverage for their businesses.
                  - generic [ref=e446]:
                    - generic [ref=e447]: Magdalena Soińska
                    - generic [ref=e448]: Product Manager at Warta (HDI/Talanx Group)
              - group "3 / 7" [ref=e449]:
                - generic [ref=e451]:
                  - img "Nationale Nederlanden" [ref=e453]
                  - generic [ref=e455]: The software built by Decerto is currently the most configurable group sales platform on the Polish market. Although our salespeople initially perceived the system as complicated, after a few improvements, it was accepted and is now used daily. The GOP system allowed us to transition from difficult-to-maintain systems and replace offline calculators with a very modern online system, which is now the primary tool in group insurance.
                  - generic [ref=e458]:
                    - generic [ref=e459]: Paweł Zbroszczyk
                    - generic [ref=e460]: Director of Software Development at Nationale Nederlanden
              - group "4 / 7" [ref=e461]:
                - generic [ref=e463]:
                  - img "Generali" [ref=e465]
                  - generic [ref=e467]: The migration was completed over a single weekend. We did not lose any data, and most of it gained in quality and consistency. It is worth noting that the Decerto team worked alongside us throughout the process. Even though there were two teams, we worked as if we were one unified entity, both at the management and development levels. Communication and mutual understanding were the key factors in the success of this project.
                  - generic [ref=e470]:
                    - generic [ref=e471]: Piotr Bułka
                    - generic [ref=e472]: COO & Board Member of Generali Group Poland
              - group "5 / 7" [ref=e473]:
                - generic [ref=e475]:
                  - img "Warta" [ref=e477]
                  - generic [ref=e479]: Decerto’s ability to adapt to our ever-evolving needs and deliver exceptional results, even in a highly demanding environment, truly sets them apart. Their expertise and commitment to quality were evident at every stage of the project. Thanks to their flexible approach and seamless collaboration, we were able to achieve our goals efficiently while maintaining the highest standards. They have proven to be a trusted partner who consistently goes above and beyond to ensure success.
                  - generic [ref=e482]:
                    - generic [ref=e483]: Łukasz Ukleja
                    - generic [ref=e484]: Director of Customer Relationship Department at Warta (HDI/Talanx Group)
              - group "6 / 7" [ref=e485]:
                - generic [ref=e487]:
                  - img "Send" [ref=e489]
                  - generic [ref=e491]: We’ve known the team at Decerto for many years and they have been instrumental in supporting us with valuable resources to develop and deliver our Underwriting Workbench. They have deep knowledge of the insurance market coupled with technical excellence. I highly recommend that insurers and insurtechs seek them out.
                  - generic [ref=e494]:
                    - generic [ref=e495]: Andy Moss
                    - generic [ref=e496]: Co-Founder & CEO of Send Technology Solutions
              - group "7 / 7" [ref=e497]:
                - generic [ref=e499]:
                  - img "Warta" [ref=e501]
                  - generic [ref=e503]: Their flexible approach to problem-solving under challenging conditions was impressive. Decerto's delivered solution was praised by external stakeholders. Cooperative and responsive, the team enabled a smooth project workflow. With their phenomenal support, many third-party clients transact using the company's portal.
                  - generic [ref=e506]:
