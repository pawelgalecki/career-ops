          - paragraph [ref=e31]:
            - strong [ref=e32]: Short description
            - text: Polish Java User Group is a group of Java technology developers and enthusiasts. The main goal of the group is to popularize Java and modern software development methodologies. Since the beginning in 1999, the group had great impact on the Polish Java community growth. They main activity are meetings with students, programmers and project managers as well as conferences with famous professionals.
          - paragraph [ref=e33]:
            - strong [ref=e34]: Full description
            - text: The Polish Java User Group is a group of Java technology developers and enthusiasts. The main goal of the group is to popularize Java and modern software development methodologies.
          - paragraph [ref=e35]: Since the beginning in 1999, the group had great impact on the Polish Java community growth. In first year of our activity we organized a conference “The Java 2 Collection Library” with the world famous professional and consultant, author of bestsellers Mr. Bruce Eckel. In 2000 we also organized the first Polish two days long conference on Java Enterprise.
          - paragraph [ref=e36]: The main region of the group activity was Krakow (the old capital of Poland), however we were also active in other cities. In 2002 we organized a conference in Warsaw – “Java Extreme Conference, Warszawa 2002”. Thanks to support from many Polish and foreign companies all events were free for participants.
          - paragraph [ref=e37]: Another area of our activity were meetings with students, programmers and project managers. We have contact with academic society including Jagiellonian University, AGH Technology and Science University and Cracow University of Economics. We also cooperate with many other groups and organizations throughout the country as well as other Java user groups all over the world. We support others initiatives, competitions, workshops and events in the area of modern technologies – sometimes being co-organizers, often as a media sponsor.
          - paragraph [ref=e38]: Among ours projects, the most famous is translation of the “Thinking in Java” into Polish. Currently we are working on new www.java.pl website where we wish to inform about Java events and technology issues. We would like to have better contact with companies – offering adverts and job offers on website and also a catalog of IT and training companies. The website has already very popular.
          - paragraph [ref=e39]:
            - text: We have started regular
            - strong [ref=e40]:
              - link "meetings" [ref=e41] [cursor=pointer]:
                - /url: https://www.java.pl/?page_id=10
            - text: in Krakow with guests from Poland and from abroad. They are presenting the newest achievements in Java technology and methodology of the software development. Our new project has been stared recently which is the international conference –
            - link "GeeCON" [ref=e43] [cursor=pointer]:
              - /url: http://www.geecon.org
            - text: focusing on Java, RIA and dynamic languages.
          - paragraph [ref=e44]: We are open to co-operate with Your company (including presentation of your solution and products), please ocntact us via email (visible at the top of the website).
          - paragraph [ref=e45]
          - paragraph [ref=e46]
