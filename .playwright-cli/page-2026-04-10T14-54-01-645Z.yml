              - text: Wspieramy naszych klientów w rozwoju, jednocześnie pamiętając o budowaniu bardziej zrównoważonej i inkluzywnej przyszłości. Dołączając do Capgemini, dołączasz do prężnie rozwijającej się firmy i stajesz się częścią zróżnicowanego globalnego zespołu pełnego pasji i zaangażowania, w którym spotykają się najlepsi eksperci i ekspertki w branży.
              - text: Wykorzystujemy technologię do tego, by na nowo napisać przyszłość. Wspólnie pracujemy nad projektami transformacji dla wiodących firm z całego świata, budujemy lepszą przyszłość i każdego dnia staramy się robić to jeszcze lepiej. Tworzymy wspaniałe historie, dzięki czemu innowacje, jakie wprowadzamy zyskują ludzki wymiar.
