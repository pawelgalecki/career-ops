          - generic [ref=e139]:
            - generic [ref=e140]:
              - paragraph [ref=e141]:
                - strong [ref=e142]: "Experience with core payment systems is mandatory: ledgers, reconsiliation, settlements, billing, invoicing, etc. You do not need to be an expert in all of them but you need knowledge in the payments domain."
              - paragraph [ref=e143]
              - paragraph [ref=e144]: A rare opportunity to join the founding Engineering team of a high potential startup with solid VC backing in the payments domain focused on (local) alternative/digital payment methods. You'll architect and build the platform from scratch with the latest tech/tooling in AWS and JVM technologies (Java21 atm but they might also use other languages for high performant requirements so you need to be flexible) and you’ll work across the entire application – you own it. This is a Microservices based, high load/throughput distributed platform with requirements on scalability/performance, reliability, security, availability, etc. You’ll be challenged for sure!
              - paragraph [ref=e145]
              - paragraph [ref=e146]: Both founders each worked within payments for 12+ years. Their personalities are amazing and a famous Engineering culture is embedded in their work values. They are carefully hiring a distributed (remote) team across Europe. The founders are based in Amsterdam.
              - paragraph [ref=e147]
              - paragraph [ref=e148]: The pre-seed round was very successful which gives the team good runway to build the team and work towards V1 in 2025. The first few hires are realised and will start soon.
              - paragraph [ref=e149]
              - paragraph [ref=e150]: You will receive a good base salary, ESOP stockpackage and permanent contract with trial period through remote.com so you can work from wherever in Europe. The Esop stock package gives you a lot more value compared to the standard Sars setup that most startups issue.
              - paragraph [ref=e151]
              - paragraph [ref=e152]:
                - strong [ref=e153]: "Technical requirements:"
              - list [ref=e154]:
                - listitem [ref=e155]: Solid experience in backend development with a strong command of JVM language(s), Java21 for sure and related frameworks like Spring Boot
                - listitem [ref=e156]: Proven experience setting up, deploying and managing applications on AWS
                - listitem [ref=e157]: Experience with high load/traffic distributed systems
                - listitem [ref=e158]: Hands-on experience with Kubernetes
                - listitem [ref=e159]: Solid understanding of microservices architecture, RESTful APIs, and database management (SQL/NoSQL)
                - listitem [ref=e160]: CI/CD pipelines, automation, and Infra as code (e.g., Terraform, CloudFormation).
              - paragraph [ref=e161]
              - paragraph [ref=e162]:
                - strong [ref=e163]: Non-tech requirements
              - list [ref=e164]:
                - listitem [ref=e165]: Strong problem-solving skills and handle ambiguity in a fast-paced startup environment
                - listitem [ref=e166]: You build it, you run it – 100% ownership and the team on call responsibility
                - listitem [ref=e167]: Product mindset; You build a system with the user/customer in mind
                - listitem [ref=e168]: Passion for building efficient, reliable and scalable systems from the ground up
                - listitem [ref=e169]: Plus; Experience in payment processing or integrating with payment gateways, handling transactions, and ensuring compliance with relevant standards and regulations.
              - paragraph [ref=e170]
              - paragraph [ref=e171]: Many start-ups build something quickly. This company will be licensed so you will build a solid platform from the start which is celebrated by many Engineers we engage with!
