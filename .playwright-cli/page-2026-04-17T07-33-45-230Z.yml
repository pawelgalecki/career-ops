              - paragraph [ref=e146]
              - paragraph [ref=e147]:
                - text: Banank is seeking an experienced
                - strong [ref=e148]: Lead Data Engineer
                - text: to design and lead the development of a real-time data platform powering business intelligence, decision-making, and backend services. This role is critical in enabling low-latency data access, event-driven processing, and real-time insights across our digital banking ecosystem.
              - paragraph [ref=e149]: You will define the architecture and implementation of streaming data systems that directly support backend services (e.g., transaction processing, fraud detection, user activity tracking), as well as business intelligence and technical analytics—ensuring high availability, consistency, and performance.
              - paragraph [ref=e150]: We understand that it may be challenging to find a candidate with experience across the entire technology stack outlined below. We are not looking for a perfect match, but for someone who is curious, adaptable, and not afraid to explore new technologies and approaches.
              - paragraph [ref=e151]: If you have strong fundamentals in data engineering and a passion for building modern real-time data systems, we encourage you to apply, even if you don’t meet every requirement listed.
              - paragraph [ref=e152]
              - paragraph [ref=e153]:
                - strong [ref=e154]: Key Responsibilities
              - list [ref=e155]:
                - listitem [ref=e156]:
                  - strong [ref=e157]: "Real-Time Data Architecture:"
                  - text: Design and lead a platform that provides real-time data pipelines and serving layers for backend services and APIs.
                - listitem [ref=e158]:
                  - strong [ref=e159]: "Streaming Pipelines:"
                  - text: Build low-latency pipelines for ingestion, transformation, and delivery of streaming data across services. Implement pipelines as code, ensuring version-controlled, reproducible, and automated infrastructure.
                - listitem [ref=e160]:
                  - strong [ref=e161]: "Backend Integration:"
                  - text: Enable backend systems to consume real-time data streams and materialized views for operational use cases.
                - listitem [ref=e162]:
                  - strong [ref=e163]: "Streaming Databases:"
                  - text: Implement and operate streaming-first databases such as RisingWave or similar technologies.
                - listitem [ref=e164]:
                  - strong [ref=e165]: "Analytical & Serving Layer:"
                  - text: Design real-time analytical and serving layers using distributed SQL engines such as
                  - strong [ref=e166]: StarRocks
                  - text: ","
                  - strong [ref=e167]: Apache Doris
                  - text: ", or similar solutions."
                - listitem [ref=e168]:
                  - strong [ref=e169]: "Lakehouse Architecture:"
                  - text: Implement modern data lakehouse solutions using Apache Iceberg, supporting both batch and streaming workloads.
                - listitem [ref=e170]:
                  - strong [ref=e171]: "Data Transformation:"
                  - text: Design and maintain transformation layers using dbt, ensuring modular, testable, and well-documented data models.
                - listitem [ref=e172]:
                  - strong [ref=e173]: "Metadata & Catalogs:"
                  - text: Manage schema evolution, metadata, and governance using Iceberg REST catalogs (e.g., Lakekeeper) or similar tools.
                - listitem [ref=e174]:
                  - strong [ref=e175]: "Data Consistency & Reliability:"
                  - text: Ensure correctness, idempotency, and fault tolerance in streaming pipelines.
                - listitem [ref=e176]:
                  - strong [ref=e177]: "Performance Optimization:"
                  - text: Optimize latency, throughput, and resource utilization for real-time workloads.
                - listitem [ref=e178]:
                  - strong [ref=e179]: "Data Quality & Governance:"
                  - text: Establish monitoring, lineage, validation, and governance processes across real-time and analytical data layers.
                - listitem [ref=e180]:
                  - strong [ref=e181]: "Cross-Team Collaboration:"
                  - text: Work closely with backend, platform, and DevSecOps teams to integrate real-time data into core systems.
                - listitem [ref=e182]:
                  - strong [ref=e183]: "Leadership & Mentorship:"
                  - text: Guide and mentor data engineers, promoting best practices in streaming and real-time architectures.
