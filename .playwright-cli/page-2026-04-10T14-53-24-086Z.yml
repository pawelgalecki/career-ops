        - paragraph [ref=e63]: Digital decisioning
        - paragraph [ref=e64]: We build custom systems on top of digital decisioning tool Nussknacker. Implementations include real-time marketing, fraud detection, revenue assurance systems.
      - generic [ref=e65]:
        - img [ref=e66]
        - paragraph [ref=e67]: Systems integration
        - paragraph [ref=e68]: TouK implements and upgrades system integration software of all levels of complexity. We take great care to ensure they guarantee both well-cooperating services and data integrity.
      - generic [ref=e69]:
        - img [ref=e70]
        - paragraph [ref=e71]: Databases
        - paragraph [ref=e72]: We have the necessary skills to tackle petabytes of data, enabling you to turn data into business insights. Whether you need a traditional relational database or want to use non-normalized data in a NoSQL repository, we’re here to help.
      - generic [ref=e73]:
        - img [ref=e74]
        - paragraph [ref=e75]: Enterprise applications
        - paragraph [ref=e76]: From SMBs to corporations, custom enterprise applications require a skilled software project team. We’ve got what you need – developers and UX designers with years of experience in developing applications that are both efficient and user-friendly.
      - generic [ref=e77]:
        - img [ref=e78]
        - paragraph [ref=e79]: IT reorganisation
        - paragraph [ref=e80]: Do you want to replace legacy software but business continuity disruptions restrain you from the big decision? We are experienced in agile re-engineering of key company systems, maintaining full continuity of business processes within your organization.
      - generic [ref=e81]:
