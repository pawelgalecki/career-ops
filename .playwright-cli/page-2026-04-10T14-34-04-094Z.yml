      - heading "About Confitura" [level=2] [ref=e107]
      - generic [ref=e108]:
        - paragraph [ref=e109]: Confitura is one of Poland’s premier and longest-running software conferences. Organized by a dedicated team of Java developers, architects, and industry professionals, the conference features a comprehensive program of sessions and workshops led by both Polish and international experts. Covering a broad spectrum of topics, Confitura addresses everything from advanced coding practices to the latest trends in software development.
        - paragraph [ref=e110]: The conference is renowned for its inclusive and welcoming atmosphere, ensuring accessibility for professionals at every stage of their career. With multiple tracks available, attendees can customize their experience based on their areas of interest and expertise. Additionally, Confitura remains committed to keeping its attendance fees affordable, fostering wider participation.
        - paragraph [ref=e111]: Beyond the technical sessions, Confitura offers extensive networking opportunities during breaks and social events, promoting meaningful connections between attendees, speakers, and industry leaders. The conference’s unwavering focus on quality content and community engagement has established it as a cornerstone event in Poland’s IT sector.
      - generic [ref=e112]: Our main goal is to promote JVM technologies and have fun doing so.
