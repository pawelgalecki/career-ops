      - heading "Confitura 2026 is in the works!" [level=2] [ref=e71]
      - generic [ref=e73]: Our goal is to bring you the same great experience as in 2025,without crowded rooms or loud, overstimulating corridors. We’re focusing on meaningful content for today’s evolving IT landscape, a strong community, and speakers worth your time, all in a well-balanced, easy-to-enjoy format at an affordable price.
    - generic [ref=e76]:
      - generic [ref=e77]:
        - heading "confitura'25 in numbers" [level=1] [ref=e78]
        - generic [ref=e79]:
          - text: Everything started in 2007, when a group of passionate Java developers created a programming event for their local community.
          - text: Today, Confitura brings together people from across Poland and beyond, with content in both Polish and English. We proudly mix talks from experienced experts and industry rockstars with presentations from new speakers who are just starting their journey and want to share something meaningful.
          - text: We run Confitura as a non-profit, working year-round to deliver the best experience possible for our software community, because we believe it truly matters.
