            - paragraph [ref=e481]: Praca w Dziale P&T XTB to dla mnie niesamowite doświadczenie, które pozwala mi na ciągły rozwój i realizację moich pomysłów. Uwielbiam transparentność i różnorodność, które są fundamentem naszej kultury organizacyjnej, a także wspólną pracę zespołową, dzięki której razem osiągamy nasze cele. Jako Product Manager odpowiedzialny za eWallet i Odsetki, codziennie staję przed nowymi wyzwaniami, które przynoszą mi ogromną satysfakcję. Praca w XTB sprawia mi ogromną radość, ponieważ mogę aktywnie uczestniczyć w tworzeniu produktów, które mają realny wpływ na rynek finansowy. Współpracując z utalentowanym zespołem i inspirującymi liderami, czuję, że każdy dzień jest pełen nowych możliwości i motywacji do dalszego rozwoju. Jestem dumna, że mogę być częścią tak dynamicznego i innowacyjnego środowiska!
