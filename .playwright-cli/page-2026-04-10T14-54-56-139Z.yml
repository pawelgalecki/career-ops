            - generic [ref=e488]: Marcin Dołowy
            - paragraph [ref=e490]: Swoją przygodę w XTB zaczynałem od Akademii IT, a po jej ukończeniu dołączyłem do zespołu zajmującego się zarządzaniem ryzykiem finansowym jako Junior Java Software Engineer. To już mój drugi rok w firmie, gdzie mam okazję rozwijać się w dynamicznym środowisku. W pracy najbardziej cenię świetnych ludzi, ich profesjonalizm i doświadczenie, którym chętnie się dzielą. Od samego początku miałem okazję pracować nad wymagającymi projektami, które pozwoliły mi szybko rozwinąć się zarówno technologicznie, jak i biznesowo. Satysfakcję daje mi to, że pracuję w firmie, która jest rozpoznawalna na rynku i wyznacza nowe trendy w branży fintech. Dzięki temu czuję, że jestem częścią intensywnego procesu rozwoju technologicznego, który realnie wpływa na przyszłość finansów.
