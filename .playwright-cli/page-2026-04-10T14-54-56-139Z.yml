            - generic [ref=e470]: Witek Sieński
            - paragraph [ref=e472]: W XTB szczególnie cenię społeczność, którą udało się tu stworzyć. Community Frontendowe to przestrzeń oparta na wsparciu, współpracy i wymianie wiedzy, co sprzyja rozwojowi i doskonaleniu umiejętności. Mobile first to dla nas nie tylko strategia, ale fundament organizacji. Mam realny wpływ na kluczowe produkty i decyzje, a technologia odgrywa tu kluczową rolę – napędza innowacje i poprawia doświadczenie deweloperów (DevEx). Dzięki Platformie Technicznej możemy eksperymentować, optymalizować i stale podnosić jakość naszych rozwiązań. W pracy odkryłem również pasję do inwestowania na giełdzie – stało się to dla mnie czymś więcej niż hobby. Nie ma tu miejsca na stagnację – firma dynamicznie się rozwija, podejmuje nowe wyzwania i realizuje ambitne cele. To sprawia, że każdy dzień przynosi nowe możliwości.
