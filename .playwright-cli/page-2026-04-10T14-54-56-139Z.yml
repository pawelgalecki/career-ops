      - paragraph [ref=e928]: Kontrakty CFD są złożonymi instrumentami i wiążą się z dużym ryzykiem szybkiej utraty środków pieniężnych z powodu dźwigni finansowej. 75% rachunków inwestorów detalicznych odnotowuje straty pieniężne w wyniku handlu kontraktami CFD u niniejszego dostawcy CFD. Zastanów się, czy rozumiesz, jak działają kontrakty CFD, i czy możesz pozwolić sobie na wysokie ryzyko utraty pieniędzy. Podejmując decyzje inwestycyjne, powinieneś kierować się własnym osądem. Więcej informacji dostępnych jest w Deklaracji Świadomości Ryzyka Inwestycyjnego, dostępnej na stronie internetowej www.xtb.pl.
