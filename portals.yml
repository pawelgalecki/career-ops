# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# Tailored for: Staff/Principal Backend Engineer, Technical Architect,
#               Senior Backend/Fullstack — Java/Spring, distributed systems,
#               fintech/payments/e-commerce/streaming. Warsaw-based, EU/remote.

# -- Title filter --

title_filter:
  positive:
    # -- Backend / Software Engineer --
    - "Backend Engineer"
    - "Backend Developer"
    - "Software Engineer"
    - "Software Developer"
    - "Platform Engineer"
    - "Java"
    - "Java Developer"
    - "Java Engineer"
    - "Spring"
    - "Spring Boot"
    - "JVM"
    - "Kotlin"
    # -- Fullstack --
    - "Fullstack"
    - "Full Stack"
    - "Full-Stack"
    # -- Architecture / Leadership --
    - "Technical Architect"
    - "Software Architect"
    - "Solutions Architect"
    - "System Architect"
    - "Tech Lead"
    - "Engineering Lead"
    # -- Infrastructure / Distributed Systems --
    - "Distributed Systems"
    - "Microservices"
    - "Infrastructure Engineer"
    # -- Payments / Fintech --
    - "Payments Engineer"
    - "Payments"
    - "Fintech"
  negative:
    - "Junior"
    - "Intern"
    - "Graduate"
    - ".NET"
    - "C#"
    - "PHP"
    - "Ruby"
    - "Rails"
    - "iOS"
    - "Android"
    - "Mobile"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Data Scientist"
    - "Machine Learning"
    - "ML Engineer"
    - "AI Engineer"
    - "NLP"
    - "Computer Vision"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Architect"

# -- Location filter --
# Applied by scan.mjs (API-sourced jobs) and the agent (Playwright/WebSearch scans).
#
# Logic:
#   1. Empty location → allowed (unknown, keep for manual review)
#   2. Any `blocked` term present → rejected (even if `allowed` term also present)
#   3. Any `allowed` term present → accepted
#   4. No `allowed` term → rejected
#
# Target: Warsaw on-site/hybrid  —OR—  Remote within CET (Europe).
# Other Polish cities = NOT acceptable for on-site/hybrid.

location_filter:
  allowed:
    - remote
    - warsaw
    - europe
    - worldwide
    - anywhere
  blocked:
    # CET-incompatible remote restrictions (US/Americas/Asia-only remote)
    - "remote - us"
    - "remote, us"
    - "remote (us)"
    - "remote - usa"
    - "remote - united states"
    - "remote, united states"
    - "remote (united states)"
    - "remote - north america"
    - "remote - canada"
    - "remote - latam"
    - "remote - asia"
    - "remote - apac"
    - "us only"
    - "usa only"
    - "united states only"
    - "north america only"
    - "americas only"
    - "apac only"
    # Polish cities other than Warsaw (on-site not commutable)
    - kraków
    - krakow
    - wrocław
    - wroclaw
    - gdańsk
    - gdansk
    - poznań
    - poznan
    - łódź
    - lodz
    - katowice
    - lublin
    - szczecin
    - bydgoszcz
    # US cities (on-site)
    - "new york"
    - "san francisco"
    - "los angeles"
    - "seattle"
    - "boston"
    - "chicago"
    - "austin"
    - "denver"
    - "washington, dc"
    # Non-EU on-site
    - toronto
    - bangalore
    - india
    - singapore
    - tokyo
    - sydney
    - australia

